# Tick counter global
globals:
  - id: tick_count
    type: int
    restore_value: no
    initial_value: '0'

# SNTP Time
time:
  - platform: sntp
    id: sntp_time
    timezone: Europe/London
    servers:
     - 0.pool.ntp.org
     - 1.pool.ntp.org
     - 2.pool.ntp.org
    on_time_sync:
      - script.execute: time_update
    on_time:
      - minutes: '*'
        seconds: 0
        then:
          - script.execute: time_update
      - seconds: /5
        then:
          - script.execute: tick_update
          - script.execute: test_a_update

# Clock + Test Scripts
script:
  - id: time_update
    then:
      - lvgl.label.update:
          id: display_time
          text: !lambda |-
            static char time_buf[17];
            auto now = id(sntp_time).now();
            snprintf(time_buf, sizeof(time_buf), "%02d:%02d", now.hour, now.minute);
            return time_buf;

  - id: tick_update
    then:
      - lambda: 'id(tick_count) += 1;'
      - lvgl.label.update:
          id: test_counter
          text: !lambda |-
            static char buf[16];
            snprintf(buf, sizeof(buf), "Tick: %d", id(tick_count));
            return buf;

  - id: test_a_update
    then:
      - lvgl.label.update:
          id: test_a_label
          text: !lambda |-
            if (!id(media_player_state).has_state()) return "A: no state";
            static char buf[64];
            snprintf(buf, sizeof(buf), "A: %s", id(media_player_state).state.c_str());
            return buf;
