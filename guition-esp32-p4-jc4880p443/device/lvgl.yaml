lvgl:
  buffer_size: 100%
  byte_order: little_endian
  displays: my_display
  touchscreens: my_touchscreen

  top_layer:
    widgets:

      # Temperature
      - label:
          text: "-° / -°"
          id: temperatures
          text_font: clockbar_font
          align: top_left
          x: 8
          y: 2
          text_color: 0xFFFFFF

      # Clock
      - label:
          text: "--:--"
          id: display_time
          text_font: clockbar_font
          align: top_mid
          x: 0
          y: 2
          text_align: center
          text_color: 0xFFFFFF

  pages:
    - id: main_page
      layout:
        type: flex
        flex_flow: column
        pad_row: 12
      width: 100%
      scrollable: false
      bg_color: Black
      bg_opa: cover
      pad_top: 40
      pad_bottom: 10
      pad_left: 20
      pad_right: 20

      widgets:

        # Title
        - label:
            text: "SPEAKER UPDATE TEST"
            text_font: label_font
            text_color: 0xFFFFFF
            text_align: center
            width: 100%

        # Diagnostic Counter (no HA data)
        - label:
            id: test_counter
            text: "Tick: 0"
            text_font: statistics_font
            text_color: 0x00FF00
            text_align: center
            width: 100%

        # Test A: on_time + script (clock clone pattern)
        - label:
            id: test_a_label
            text: "A (on_time+script): ---"
            text_font: label_font
            text_color: 0xFFFF00
            width: 100%

        # Test B: interval + direct lvgl.label.update
        - label:
            id: test_b_label
            text: "B (interval+direct): ---"
            text_font: label_font
            text_color: 0x00FFFF
            width: 100%

        # Test C: interval + raw LVGL C API
        - label:
            id: test_c_label
            text: "C (interval+raw C): ---"
            text_font: label_font
            text_color: 0xFF00FF
            width: 100%

        # Entity being tested
        - label:
            text: "Sensor: media_player.3rd_floor_speaker"
            text_font: clockbar_font
            text_color: 0x888888
            width: 100%
