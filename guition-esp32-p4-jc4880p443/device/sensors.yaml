# Speaker state sensor (HA subscription)
text_sensor:
  - platform: homeassistant
    entity_id: media_player.3rd_floor_speaker
    id: media_player_state

# Temperature sensors (keep for top bar)
sensor:
  - platform: homeassistant
    entity_id: sensor.office_temperature
    id: office_temperature
    on_value:
      - lvgl.label.update:
          id: temperatures
          text:
            format: "%d° / %d°"
            args: [ '(int)round(id(outdoor_temperature).state)', '(int)round(x)' ]

  - platform: homeassistant
    entity_id: sensor.outdoor_temperature
    id: outdoor_temperature
    on_value:
      - lvgl.label.update:
          id: temperatures
          text:
            format: "%d° / %d°"
            args: [ '(int)round(x)', '(int)round(id(office_temperature).state)' ]

# Test B and Test C: interval-based updates
interval:
  - interval: 5s
    then:
      # Test B: direct lvgl.label.update (no script wrapper)
      - lvgl.label.update:
          id: test_b_label
          text: !lambda |-
            if (!id(media_player_state).has_state()) return "B: no state";
            static char buf[64];
            snprintf(buf, sizeof(buf), "B: %s", id(media_player_state).state.c_str());
            return buf;
      # Test C: raw LVGL C API (bypass ESPHome wrapper)
      - lambda: |-
          const char *state = "C: no state";
          static char buf[64];
          if (id(media_player_state).has_state()) {
            snprintf(buf, sizeof(buf), "C: %s", id(media_player_state).state.c_str());
            state = buf;
          }
          lv_label_set_text(id(test_c_label), state);
