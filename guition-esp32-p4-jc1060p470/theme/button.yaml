substitutions:
  icon_font: icon_font
  button_on_color: "0xFF8C00"
  button_text_color: "0xEEEEFF"
  button_control_color: "0x1A1A3A"
  button_height: 130px
  button_width: 200px
  padding: 14px
  radius: 8px
  card_bg_color: "0x12122A"

lvgl:
  style_definitions:
    - id: control
      bg_color: $button_control_color

    - id: card_style
      bg_color: $card_bg_color
      radius: 12
      pad_all: 14
      border_width: 1
      border_color: 0x2A2A4A
      border_opa: cover

    - id: media_transport_btn
      bg_color: $button_control_color
      radius: 24
      width: 48
      height: 48
      pad_all: 0
      shadow_width: 8
      shadow_color: 0x00E5FF
      shadow_opa: 30
      text_color: $button_text_color

    - id: action_btn
      bg_color: $button_control_color
      radius: 8
      width: 100%
      height: 52
      pad_all: 8
      shadow_width: 0
      text_color: $button_text_color

  theme:
    button:
      text_font: label_font
      scroll_on_focus: false
      radius: $radius
      width: $button_width
      height: $button_height
      pad_all: $padding
      shadow_width: 0
      text_color: $button_text_color
      checked:
        bg_color: $button_on_color
        text_color: $button_text_color
