lvgl:
  displays: my_display
  byte_order: little_endian

  top_layer:
    widgets:

      # Indoor Conditions (temp + humidity)
      - label:
          text: "--F --%"
          id: indoor_conditions
          text_font: clockbar_font
          align: top_left
          x: 12
          y: 8
          text_color: 0xFFFFFF

      # Dual Timezone Clock
      - label:
          text: "--:-- -- ET | --:-- -- PT"
          id: display_time
          text_font: clockbar_font
          align: top_mid
          x: 0
          y: 8
          text_align: center
          text_color: 0xFFFFFF

      # Wifi Signal Icon
      - label:
          text: $wifi_alert
          id: wifi_icon
          text_font: icon_font_small
          align: top_right
          x: -12
          y: 4
          text_color: 0x585B70

      # Outdoor Temperature
      - label:
          text: "--F"
          id: outdoor_temp
          text_font: clockbar_font
          align: top_right
          x: -46
          y: 8
          text_color: 0xFFFFFF

  pages:
    - id: main_page
      layout:
        type: flex
        flex_flow: column
        pad_row: 14
      width: 100%
      bg_color: 0x11111B
      bg_opa: cover
      pad_top: 46
      pad_bottom: 12
      pad_left: 24
      pad_right: 24

      widgets:

        # Title
        - label:
            text: "API CONNECTIVITY DIAGNOSTICS"
            text_font: header_font
            text_color: 0xFFFFFF
            text_align: center
            width: 100%

        # Tick counter (proves local execution works)
        - label:
            id: test_counter
            text: "Tick: 0"
            text_font: statistics_font
            text_color: 0x00FF00
            text_align: center
            width: 100%

        # WiFi signal (local sensor, no HA needed)
        - label:
            id: wifi_db_label
            text: "WiFi: ---"
            text_font: label_font
            text_color: 0x89B4FA
            width: 100%

        # API connection status
        - label:
            id: api_status_label
            text: "API: --- | HA subscribed: ---"
            text_font: label_font
            text_color: 0xFFFF00
            width: 100%

        # Last connected client
        - label:
            id: last_client_label
            text: "Last client: (none)"
            text_font: label_font
            text_color: 0xFFFFFF
            width: 100%

        # Speaker entity state (the actual HA pipeline test)
        - label:
            id: speaker_state_label
            text: "Speaker: no state"
            text_font: label_font
            text_color: 0xFF00FF
            width: 100%

        # Decision matrix help text
        - label:
            text: "If API stays NO: HA > Settings > ESPHome"
            text_font: clockbar_font
            text_color: 0x585B70
            width: 100%
        - label:
            text: "If API YES but HA NO: log viewer only"
            text_font: clockbar_font
            text_color: 0x585B70
            width: 100%
        - label:
            text: "If HA YES but no state: entity_id wrong"
            text_font: clockbar_font
            text_color: 0x585B70
            width: 100%
