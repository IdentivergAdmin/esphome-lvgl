                    - button:
                        id: vol_btn_8
                        flex_grow: 1
                        height: 35
                        radius: 4
                        bg_color: 0x1A1A3A
                        shadow_width: 0
                        on_click:
                          - homeassistant.action:
                              action: media_player.volume_set
                              data:
                                entity_id: media_player.3rd_floor_speaker
                                volume_level: "0.4"
                    - button:
                        id: vol_btn_9
                        flex_grow: 1
                        height: 35
                        radius: 4
                        bg_color: 0x1A1A3A
                        shadow_width: 0
                        on_click:
                          - homeassistant.action:
                              action: media_player.volume_set
                              data:
                                entity_id: media_player.3rd_floor_speaker
                                volume_level: "0.45"
                    - button:
                        id: vol_btn_10
                        flex_grow: 1
                        height: 35
                        radius: 4
                        bg_color: 0x1A1A3A
                        shadow_width: 0
                        on_click:
                          - homeassistant.action:
                              action: media_player.volume_set
                              data:
                                entity_id: media_player.3rd_floor_speaker
                                volume_level: "0.5"
                    - button:
                        id: vol_btn_11
                        flex_grow: 1
                        height: 35
                        radius: 4
                        bg_color: 0x1A1A3A
                        shadow_width: 0
                        on_click:
                          - homeassistant.action:
                              action: media_player.volume_set
                              data:
                                entity_id: media_player.3rd_floor_speaker
                                volume_level: "0.55"
                    - button:
                        id: vol_btn_12
                        flex_grow: 1
                        height: 35
                        radius: 4
                        bg_color: 0x1A1A3A
                        shadow_width: 0
                        on_click:
                          - homeassistant.action:
                              action: media_player.volume_set
                              data:
                                entity_id: media_player.3rd_floor_speaker
                                volume_level: "0.6"
                    - button:
                        id: vol_btn_13
                        flex_grow: 1
                        height: 35
                        radius: 4
                        bg_color: 0x1A1A3A
                        shadow_width: 0
                        on_click:
                          - homeassistant.action:
                              action: media_player.volume_set
                              data:
                                entity_id: media_player.3rd_floor_speaker
                                volume_level: "0.65"
                    - button:
                        id: vol_btn_14
                        flex_grow: 1
                        height: 35
                        radius: 4
                        bg_color: 0x1A1A3A
                        shadow_width: 0
                        on_click:
                          - homeassistant.action:
                              action: media_player.volume_set
                              data:
                                entity_id: media_player.3rd_floor_speaker
                                volume_level: "0.7"
                    - button:
                        id: vol_btn_15
                        flex_grow: 1
                        height: 35
                        radius: 4
                        bg_color: 0x1A1A3A
                        shadow_width: 0
                        on_click:
                          - homeassistant.action:
                              action: media_player.volume_set
                              data:
                                entity_id: media_player.3rd_floor_speaker
                                volume_level: "0.75"
                    - button:
                        id: vol_btn_16
                        flex_grow: 1
                        height: 35
                        radius: 4
                        bg_color: 0x1A1A3A
                        shadow_width: 0
                        on_click:
                          - homeassistant.action:
                              action: media_player.volume_set
                              data:
                                entity_id: media_player.3rd_floor_speaker
                                volume_level: "0.8"
                    - button:
                        id: vol_btn_17
                        flex_grow: 1
                        height: 35
                        radius: 4
                        bg_color: 0x1A1A3A
                        shadow_width: 0
                        on_click:
                          - homeassistant.action:
                              action: media_player.volume_set
                              data:
                                entity_id: media_player.3rd_floor_speaker
                                volume_level: "0.85"
                    - button:
                        id: vol_btn_18
                        flex_grow: 1
                        height: 35
                        radius: 4
                        bg_color: 0x1A1A3A
                        shadow_width: 0
                        on_click:
                          - homeassistant.action:
                              action: media_player.volume_set
                              data:
                                entity_id: media_player.3rd_floor_speaker
                                volume_level: "0.9"
                    - button:
                        id: vol_btn_19
                        flex_grow: 1
                        height: 35
                        radius: 4
                        bg_color: 0x1A1A3A
                        shadow_width: 0
                        on_click:
                          - homeassistant.action:
                              action: media_player.volume_set
                              data:
                                entity_id: media_player.3rd_floor_speaker
                                volume_level: "0.95"
                    - button:
                        id: vol_btn_20
                        flex_grow: 1
                        height: 35
                        radius: 4
                        bg_color: 0x1A1A3A
                        shadow_width: 0
                        on_click:
                          - homeassistant.action:
                              action: media_player.volume_set
                              data:
                                entity_id: media_player.3rd_floor_speaker
                                volume_level: "1.0"

        # ============================================================
        # RIGHT COLUMN (fills remaining ~340px)
        # ============================================================
        - obj:
            id: right_column
            height: 100%
            bg_opa: TRANSP
            pad_all: 0
            border_width: 0
            flex_grow: 1
            layout:
              type: flex
              flex_flow: column
              pad_row: 12
            widgets:

              # -- Weather Card --
              - obj:
                  id: weather_card
                  styles: card_style
                  width: 100%
                  height: 190
                  layout:
                    type: flex
                    flex_flow: column
                    flex_align_main: center
                    flex_align_cross: center
                    pad_row: 4
                  widgets:
                    # Weather image container (all 16 stacked)
                    - obj:
                        width: 100%
                        height: 158
                        bg_opa: TRANSP
                        pad_all: 0
                        border_width: 0
                        widgets:
                          - image:
                              id: w_sunny
                              src: weather_sunny_img
                              align: center
                              hidden: true
                          - image:
                              id: w_clear_night
                              src: weather_clear_night_img
                              align: center
                              hidden: true
                          - image:
                              id: w_cloudy
                              src: weather_cloudy_img
                              align: center
                              hidden: true
                          - image:
                              id: w_partlycloudy_sun
                              src: weather_partlycloudy_sun_img
                              align: center
                              hidden: true
                          - image:
                              id: w_partlycloudy_moon
                              src: weather_partlycloudy_moon_img
                              align: center
                              hidden: true
                          - image:
                              id: w_rainy
                              src: weather_rainy_img
                              align: center
                              hidden: true
                          - image:
                              id: w_pouring
                              src: weather_pouring_img
                              align: center
                              hidden: true
                          - image:
                              id: w_snowy
                              src: weather_snowy_img
                              align: center
                              hidden: true
                          - image:
                              id: w_snowy_rainy
                              src: weather_snowy_rainy_img
                              align: center
                              hidden: true
                          - image:
                              id: w_fog
                              src: weather_fog_img
                              align: center
                              hidden: true
                          - image:
                              id: w_hail
                              src: weather_hail_img
                              align: center
                              hidden: true
                          - image:
                              id: w_lightning
                              src: weather_lightning_img
                              align: center
                              hidden: true
                          - image:
                              id: w_lightning_rainy
                              src: weather_lightning_rainy_img
                              align: center
                              hidden: true
                          - image:
                              id: w_windy
                              src: weather_windy_img
                              align: center
                              hidden: true
                          - image:
                              id: w_windy_variant
                              src: weather_windy_variant_img
                              align: center
                              hidden: true
                          - image:
                              id: w_windsock
                              src: weather_windsock_img
                              align: center
                              hidden: true

                    # Condition text
                    - label:
                        id: weather_condition_label
                        text: ""
                        text_font: clockbar_font
                        text_color: 0x7B7BA0
                        text_align: center

              # -- Door Status Row --
              - obj:
                  id: door_status_card
                  styles: card_style
                  width: 100%
                  height: 60
                  layout:
                    type: flex
                    flex_flow: row
                    flex_align_main: space_evenly
                    flex_align_cross: center
                  widgets:
                    # Front door group
                    - obj:
                        width: SIZE_CONTENT
                        height: SIZE_CONTENT
                        bg_opa: TRANSP
                        pad_all: 0
                        border_width: 0
                        layout:
                          type: flex
                          flex_flow: row
                          flex_align_cross: center
                          pad_column: 8
                        widgets:
                          - label:
                              id: front_door_icon
                              text: $door_closed
                              text_font: icon_font_small
                              text_color: 0x39FF14
                          - label:
                              id: front_door_label
                              text: "Front"
                              text_font: clockbar_font
                              text_color: 0xEEEEFF

                    # Garage door group
                    - obj:
                        width: SIZE_CONTENT
                        height: SIZE_CONTENT
                        bg_opa: TRANSP
                        pad_all: 0
                        border_width: 0
                        layout:
                          type: flex
                          flex_flow: row
                          flex_align_cross: center
                          pad_column: 8
                        widgets:
                          - label:
                              id: garage_door_icon
                              text: $garage_closed
                              text_font: icon_font_small
                              text_color: 0x39FF14
                          - label:
                              id: garage_door_label
                              text: "Garage"
                              text_font: clockbar_font
                              text_color: 0xEEEEFF

              # -- Climate Control Card --
              - obj:
                  id: climate_card
                  styles: card_style
                  width: 100%
                  flex_grow: 1
                  layout:
                    type: flex
                    flex_flow: column
                    flex_align_main: center
                    flex_align_cross: center
                    pad_row: 8
                  widgets:
                    # Room conditions (compact row)
                    - obj:
                        width: 100%
                        height: SIZE_CONTENT
                        bg_opa: TRANSP
                        pad_all: 0
                        border_width: 0
                        layout:
                          type: flex
                          flex_flow: row
                          flex_align_main: center
                          flex_align_cross: center
                          pad_column: 10
                        widgets:
                          - label:
                              text: $thermometer
                              text_font: icon_font_small
                              text_color: 0x7B7BA0
                          - label:
                              id: room_temp_value
                              text: "--"
                              text_font: label_font
                              text_color: 0xEEEEFF
                          - label:
                              text: "°F"
                              text_font: clockbar_font
                              text_color: 0x7B7BA0
                          - obj:
                              width: 1
                              height: 20
                              bg_color: 0x2A2A4A
                              bg_opa: cover
                              pad_all: 0
                          - label:
                              text: $water_percent
                              text_font: icon_font_small
                              text_color: 0x7B7BA0
                          - label:
                              id: room_humidity_value
                              text: "--"
                              text_font: label_font
                              text_color: 0xEEEEFF
                          - label:
                              text: "%"
                              text_font: clockbar_font
                              text_color: 0x7B7BA0

                    # Climate header: icon + action label
                    - obj:
                        width: SIZE_CONTENT
                        height: SIZE_CONTENT
                        bg_opa: TRANSP
                        pad_all: 0
                        border_width: 0
                        layout:
                          type: flex
                          flex_flow: row
                          flex_align_cross: center
                          pad_column: 10
                        widgets:
                          - label:
                              id: climate_mode_icon
                              text: $thermometer
                              text_font: icon_font
                              text_color: 0x7B7BA0
                          - label:
                              id: climate_action_label
                              text: "Idle"
                              text_font: label_font
                              text_color: 0xEEEEFF

                    # Target range
                    - label:
                        id: climate_target_label
                        text: "-- — --°F"
                        text_font: header_font
                        text_color: 0xEEEEFF
                        text_align: center

                    # Preset
                    - label:
                        id: climate_preset_label
                        text: ""
                        text_font: clockbar_font
                        text_color: 0x7B7BA0
                        text_align: center

                    # Temp up/down buttons
                    - obj:
                        width: SIZE_CONTENT
                        height: SIZE_CONTENT
                        bg_opa: TRANSP
                        pad_all: 0
                        border_width: 0
                        layout:
                          type: flex
                          flex_flow: row
                          flex_align_main: center
                          pad_column: 24
                        widgets:
                          # Temp down button
                          - button:
                              id: btn_temp_down
                              width: 56
                              height: 56
                              radius: 28
                              bg_color: 0x1A1A3A
                              shadow_width: 0
                              on_press:
                                - lvgl.widget.update:
                                    id: btn_temp_down
                                    shadow_width: 8
                                    shadow_color: 0x00E5FF
                                    shadow_opa: 60%
                              on_release:
                                - lvgl.widget.update:
                                    id: btn_temp_down
                                    shadow_width: 0
                              on_click:
                                - homeassistant.action:
                                    action: climate.set_temperature
                                    data:
                                      entity_id: climate.third_floor
                                      hvac_mode: heat_cool
                                    data_template:
                                      target_temp_high: !lambda |-
                                        return id(climate_target_high).state - 1;
                                      target_temp_low: !lambda |-
                                        return id(climate_target_low).state - 1;
                              widgets:
                                - label:
                                    text: $chevron_down
                                    text_font: icon_font
                                    text_color: 0x00E5FF
                                    align: center

                          # Temp up button
                          - button:
                              id: btn_temp_up
                              width: 56
                              height: 56
                              radius: 28
                              bg_color: 0x1A1A3A
                              shadow_width: 0
                              on_press:
                                - lvgl.widget.update:
                                    id: btn_temp_up
                                    shadow_width: 8
                                    shadow_color: 0xFF8C00
                                    shadow_opa: 60%
                              on_release:
                                - lvgl.widget.update:
                                    id: btn_temp_up
                                    shadow_width: 0
                              on_click:
                                - homeassistant.action:
                                    action: climate.set_temperature
                                    data:
                                      entity_id: climate.third_floor
                                      hvac_mode: heat_cool
                                    data_template:
                                      target_temp_high: !lambda |-
                                        return id(climate_target_high).state + 1;
                                      target_temp_low: !lambda |-
                                        return id(climate_target_low).state + 1;
