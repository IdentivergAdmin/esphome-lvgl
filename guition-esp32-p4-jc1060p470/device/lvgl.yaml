lvgl:
  displays: my_display
  byte_order: little_endian

  top_layer:
    widgets:

      # Indoor Conditions (temp + humidity)
      - label:
          text: "--F --%"
          id: indoor_conditions
          text_font: clockbar_font
          align: top_left
          x: 12
          y: 8
          text_color: 0xFFFFFF

      # Dual Timezone Clock
      - label:
          text: "--:-- -- ET | --:-- -- PT"
          id: display_time
          text_font: clockbar_font
          align: top_mid
          x: 0
          y: 8
          text_align: center
          text_color: 0xFFFFFF

      # Wifi Signal Icon
      - label:
          text: $wifi_alert
          id: wifi_icon
          text_font: icon_font_small
          align: top_right
          x: -12
          y: 4
          text_color: 0x585B70

      # Outdoor Temperature
      - label:
          text: "--F"
          id: outdoor_temp
          text_font: clockbar_font
          align: top_right
          x: -46
          y: 8
          text_color: 0xFFFFFF

  pages:
    - id: main_page
      layout:
        type: flex
        flex_flow: column
        pad_row: 14
      width: 100%
      bg_color: 0x11111B
      bg_opa: cover
      pad_top: 46
      pad_bottom: 12
      pad_left: 24
      pad_right: 24

      widgets:

        # Title
        - label:
            text: "SPEAKER UPDATE TEST"
            text_font: header_font
            text_color: 0xFFFFFF
            text_align: center
            width: 100%

        # Diagnostic Counter (no HA data, pure local)
        - label:
            id: test_counter
            text: "Tick: 0"
            text_font: statistics_font
            text_color: 0x00FF00
            text_align: center
            width: 100%

        # Test A: on_time + script (clock clone pattern)
        - label:
            id: test_a_label
            text: "A (on_time+script): ---"
            text_font: label_font
            text_color: 0xFFFF00
            width: 100%

        # Test B: interval + direct lvgl.label.update
        - label:
            id: test_b_label
            text: "B (interval+direct): ---"
            text_font: label_font
            text_color: 0x00FFFF
            width: 100%

        # Test C: interval + raw LVGL C API
        - label:
            id: test_c_label
            text: "C (interval+raw C): ---"
            text_font: label_font
            text_color: 0xFF00FF
            width: 100%

        # Entity being tested
        - label:
            text: "Sensor: media_player.3rd_floor_speaker"
            text_font: clockbar_font
            text_color: 0x585B70
            width: 100%
