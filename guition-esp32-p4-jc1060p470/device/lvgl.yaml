lvgl:
  displays: my_display
  byte_order: little_endian

  top_layer:
    widgets:

      # Indoor Conditions (temp + humidity)
      - label:
          text: "--F --%"
          id: indoor_conditions
          text_font: clockbar_font
          align: top_left
          x: 12
          y: 8
          text_color: 0xEEEEFF

      # Dual Timezone Clock
      - label:
          text: "--:-- -- ET | --:-- -- PT"
          id: display_time
          text_font: clockbar_font
          align: top_mid
          x: 0
          y: 8
          text_align: center
          text_color: 0xEEEEFF

      # Wifi Signal Icon
      - label:
          text: $wifi_alert
          id: wifi_icon
          text_font: icon_font_small
          align: top_right
          x: -12
          y: 4
          text_color: 0x585B70

      # Outdoor Temperature
      - label:
          text: "--F"
          id: outdoor_temp
          text_font: clockbar_font
          align: top_right
          x: -46
          y: 8
          text_color: 0xEEEEFF

  pages:
    - id: main_page
      layout:
        type: flex
        flex_flow: row
        pad_column: 16
      width: 100%
      bg_color: 0x0A0A1A
      bg_opa: cover
      pad_top: 56
      pad_bottom: 12
      pad_left: 16
      pad_right: 16

      widgets:

        # ============================================================
        # LEFT: Media Player Card (620px)
        # ============================================================
        - obj:
            id: media_card
            styles: card_style
            width: 620
            height: 100%
            layout:
              type: flex
              flex_flow: column
              pad_row: 12
            shadow_width: 12
            shadow_spread: 2
            shadow_color: 0x00E5FF
            shadow_opa: 40%
            widgets:

              # -- Header: icon + track info --
              - obj:
                  width: 100%
                  height: SIZE_CONTENT
                  bg_opa: TRANSP
                  pad_all: 0
                  border_width: 0
                  layout:
                    type: flex
                    flex_flow: row
                    pad_column: 14
                    flex_align_cross: center
                  widgets:
                    # Music icon (permanent, no more album art overlay)
                    - label:
                        id: media_icon_label
                        text: $music
                        text_font: icon_font
                        text_color: 0x00E5FF

                    # Track info column
                    - obj:
                        width: SIZE_CONTENT
                        height: SIZE_CONTENT
                        bg_opa: TRANSP
                        pad_all: 0
                        border_width: 0
                        layout:
                          type: flex
                          flex_flow: column
                          pad_row: 2
                        widgets:
                          - label:
                              id: media_now_playing
                              text: "Media Player"
                              text_font: clockbar_font
                              text_color: 0x7B7BA0
                          - label:
                              id: media_title
                              text: "No media"
                              text_font: header_font
                              text_color: 0xEEEEFF
                              long_mode: DOT
                              width: 480
                          - label:
                              id: media_artist
                              text: ""
                              text_font: label_font
                              text_color: 0xBB86FC

              # -- Center: Transport with volume arc --
              - obj:
                  width: 100%
                  height: SIZE_CONTENT
                  bg_opa: TRANSP
                  pad_all: 0
                  border_width: 0
                  layout:
                    type: flex
                    flex_flow: row
                    flex_align_main: center
                    flex_align_cross: center
                    pad_column: 32
                  widgets:
                    # Previous track button
                    - button:
                        id: btn_prev
                        width: 64
                        height: 64
                        styles: media_transport_btn
                        radius: 32
                        on_click:
                          - homeassistant.action:
                              action: media_player.media_previous_track
                              data:
                                entity_id: media_player.3rd_floor_speaker
                        on_press:
                          - lvgl.widget.update:
                              id: btn_prev
                              shadow_width: 12
                              shadow_color: 0x00E5FF
                              shadow_opa: 60%
                        on_release:
                          - lvgl.widget.update:
                              id: btn_prev
                              shadow_width: 8
                              shadow_color: 0x00E5FF
                              shadow_opa: 30%
                        widgets:
                          - label:
                              text: $skip_previous
                              text_font: icon_font
                              text_color: 0xEEEEFF
                              align: center

                    # Circle container with arc + play button
                    - obj:
                        id: circle_container
                        width: 200
                        height: 200
                        radius: 100
                        bg_color: 0x0A0A1A
                        border_width: 0
                        pad_all: 0
                        widgets:
                          # Volume arc (display-only)
                          - arc:
                              id: volume_arc
                              width: 180
                              height: 180
                              align: center
                              adjustable: false
                              min_value: 0
                              max_value: 100
                              value: 50
                              rotation: 135
                              arc_width: 8
                              arc_color: 0x12122A
                              indicator:
                                arc_width: 8
                                arc_color: 0x00E5FF
                              knob:
                                width: 0
                                height: 0
                                pad_all: 0

                          # Play/Pause button (centered on top of arc)
                          - button:
                              id: btn_play_pause
                              width: 120
                              height: 120
                              radius: 60
                              bg_color: 0x1A1A3A
                              align: center
                              checkable: true
                              shadow_width: 16
                              shadow_color: 0x00E5FF
                              shadow_opa: 50%
                              checked:
                                bg_color: 0xFF0066
                                shadow_width: 28
                                shadow_color: 0xFF0066
                                shadow_opa: 80%
                              on_click:
                                - homeassistant.action:
                                    action: media_player.media_play_pause
                                    data:
                                      entity_id: media_player.3rd_floor_speaker
                              widgets:
                                - label:
                                    id: play_pause_icon
                                    text: $play
                                    text_font: icon_font
                                    text_color: 0xEEEEFF
                                    align: center

                    # Next track button
                    - button:
                        id: btn_next
                        width: 64
                        height: 64
                        styles: media_transport_btn
                        radius: 32
                        on_click:
                          - homeassistant.action:
                              action: media_player.media_next_track
                              data:
                                entity_id: media_player.3rd_floor_speaker
                        on_press:
                          - lvgl.widget.update:
                              id: btn_next
                              shadow_width: 12
                              shadow_color: 0x00E5FF
                              shadow_opa: 60%
                        on_release:
                          - lvgl.widget.update:
                              id: btn_next
                              shadow_width: 8
                              shadow_color: 0x00E5FF
                              shadow_opa: 30%
                        widgets:
                          - label:
                              text: $skip_next
                              text_font: icon_font
                              text_color: 0xEEEEFF
                              align: center

              # -- Bottom: Volume slider row --
              - obj:
                  width: 100%
                  height: SIZE_CONTENT
                  bg_opa: TRANSP
                  pad_all: 0
                  border_width: 0
                  layout:
                    type: flex
                    flex_flow: row
                    flex_align_cross: center
                    pad_column: 8
                  widgets:
                    # Volume icon
                    - label:
                        id: volume_icon
                        text: $volume_high
                        text_font: icon_font_small
                        text_color: 0x7B7BA0

                    # Volume level buttons (20 tiers, 5%-100%)
                    - button:
                        id: vol_btn_1
                        flex_grow: 1
                        height: 35
                        radius: 4
                        bg_color: 0x1A1A3A
                        shadow_width: 0
                        on_click:
                          - homeassistant.action:
                              action: media_player.volume_set
                              data:
                                entity_id: media_player.3rd_floor_speaker
                                volume_level: "0.05"
                    - button:
                        id: vol_btn_2
                        flex_grow: 1
                        height: 35
                        radius: 4
                        bg_color: 0x1A1A3A
                        shadow_width: 0
                        on_click:
                          - homeassistant.action:
                              action: media_player.volume_set
                              data:
                                entity_id: media_player.3rd_floor_speaker
                                volume_level: "0.1"
                    - button:
                        id: vol_btn_3
                        flex_grow: 1
                        height: 35
                        radius: 4
                        bg_color: 0x1A1A3A
                        shadow_width: 0
                        on_click:
                          - homeassistant.action:
                              action: media_player.volume_set
                              data:
                                entity_id: media_player.3rd_floor_speaker
                                volume_level: "0.15"
                    - button:
                        id: vol_btn_4
                        flex_grow: 1
                        height: 35
                        radius: 4
                        bg_color: 0x1A1A3A
                        shadow_width: 0
                        on_click:
                          - homeassistant.action:
                              action: media_player.volume_set
                              data:
                                entity_id: media_player.3rd_floor_speaker
                                volume_level: "0.2"
                    - button:
                        id: vol_btn_5
                        flex_grow: 1
                        height: 35
                        radius: 4
                        bg_color: 0x1A1A3A
                        shadow_width: 0
                        on_click:
                          - homeassistant.action:
                              action: media_player.volume_set
                              data:
                                entity_id: media_player.3rd_floor_speaker
                                volume_level: "0.25"
                    - button:
                        id: vol_btn_6
                        flex_grow: 1
                        height: 35
                        radius: 4
                        bg_color: 0x1A1A3A
                        shadow_width: 0
                        on_click:
                          - homeassistant.action:
                              action: media_player.volume_set
                              data:
                                entity_id: media_player.3rd_floor_speaker
                                volume_level: "0.3"
                    - button:
                        id: vol_btn_7
                        flex_grow: 1
                        height: 35
                        radius: 4
                        bg_color: 0x1A1A3A
                        shadow_width: 0
                        on_click:
                          - homeassistant.action:
                              action: media_player.volume_set
