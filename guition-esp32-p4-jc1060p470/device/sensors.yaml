# Speaker state sensor (HA subscription)
text_sensor:
  - platform: homeassistant
    entity_id: media_player.3rd_floor_speaker
    id: media_player_state

# Temperature sensors (keep for top bar)
sensor:
  # Indoor Temperature
  - platform: homeassistant
    entity_id: sensor.third_floor_temperature
    id: third_floor_temperature
    on_value:
      - script.execute: update_topbar_labels

  # Indoor Humidity
  - platform: homeassistant
    entity_id: sensor.third_floor_humidity
    id: third_floor_humidity
    on_value:
      - script.execute: update_topbar_labels

  # Outdoor Temperature
  - platform: homeassistant
    entity_id: weather.third_floor
    attribute: temperature
    id: outdoor_temperature
    on_value:
      - script.execute: update_topbar_labels

  # Wifi Signal Strength (for top bar indicator)
  - platform: copy
    source_id: wifi_signal_db
    id: wifi_strength_pct
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);
    on_value:
      - script.execute: update_wifi_icon

# Scripts for top bar updates
script:
  # Update top bar labels
  - id: update_topbar_labels
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return id(third_floor_temperature).has_state() && id(third_floor_humidity).has_state();'
          then:
            - lvgl.label.update:
                id: indoor_conditions
                text:
                  format: "%.0fF %.0f%%"
                  args: ['id(third_floor_temperature).state', 'id(third_floor_humidity).state']
      - if:
          condition:
            lambda: 'return id(outdoor_temperature).has_state();'
          then:
            - lvgl.label.update:
                id: outdoor_temp
                text:
                  format: "%.0fF"
                  args: ['id(outdoor_temperature).state']

  # Update wifi icon based on signal strength
  - id: update_wifi_icon
    mode: restart
    then:
      - lvgl.label.update:
          id: wifi_icon
          text: !lambda |-
            float pct = id(wifi_strength_pct).has_state() ? id(wifi_strength_pct).state : 0;
            if (pct > 75) return "\U000F092D";
            if (pct > 50) return "\U000F0928";
            if (pct > 25) return "\U000F0925";
            if (pct > 0) return "\U000F0922";
            return "\U000F092B";

