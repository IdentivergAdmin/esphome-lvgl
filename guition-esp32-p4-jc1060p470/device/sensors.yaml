# Globals for climate setpoint adjustment
globals:
  - id: target_temp_low
    type: float
    restore_value: no
    initial_value: '66.0'
  - id: target_temp_high
    type: float
    restore_value: no
    initial_value: '75.0'

sensor:

  # Indoor Temperature
  - platform: homeassistant
    entity_id: sensor.third_floor_temperature
    id: third_floor_temperature
    on_value:
      - lvgl.label.update:
          id: climate_current_temp
          text:
            format: "%.0fF"
            args: [ 'x' ]
      - lvgl.label.update:
          id: indoor_conditions
          text:
            format: "%.0fF %.0f%%"
            args: [ 'x', 'id(third_floor_humidity).state' ]

  # Indoor Humidity
  - platform: homeassistant
    entity_id: sensor.third_floor_humidity
    id: third_floor_humidity
    on_value:
      - lvgl.label.update:
          id: climate_humidity
          text:
            format: "%.0f%%"
            args: [ 'x' ]
      - lvgl.label.update:
          id: indoor_conditions
          text:
            format: "%.0fF %.0f%%"
            args: [ 'id(third_floor_temperature).state', 'x' ]

  # Outdoor Temperature (from weather entity)
  - platform: homeassistant
    entity_id: weather.third_floor
    attribute: temperature
    id: outdoor_temperature
    on_value:
      - lvgl.label.update:
          id: outdoor_temp
          text:
            format: "%.0fF"
            args: [ 'x' ]

  # Climate Target Low
  - platform: homeassistant
    entity_id: climate.third_floor
    attribute: target_temp_low
    id: climate_target_low
    on_value:
      - globals.set:
          id: target_temp_low
          value: !lambda return x;
      - lvgl.label.update:
          id: climate_target_range
          text:
            format: "%.0f - %.0fF"
            args: [ 'x', 'id(climate_target_high).state' ]

  # Climate Target High
  - platform: homeassistant
    entity_id: climate.third_floor
    attribute: target_temp_high
    id: climate_target_high
    on_value:
      - globals.set:
          id: target_temp_high
          value: !lambda return x;
      - lvgl.label.update:
          id: climate_target_range
          text:
            format: "%.0f - %.0fF"
            args: [ 'id(climate_target_low).state', 'x' ]

  # Media Player Volume
  - platform: homeassistant
    entity_id: media_player.3rd_floor_speaker
    attribute: volume_level
    id: speaker_volume
    on_value:
      - lvgl.slider.update:
          id: volume_slider
          value: !lambda return (int)(x * 100);
      - lvgl.label.update:
          id: volume_label
          text:
            format: "%.0f%%"
            args: [ 'x * 100' ]

text_sensor:

  # HVAC Mode (state of climate entity)
  - platform: homeassistant
    entity_id: climate.third_floor
    id: hvac_mode
    on_value:
      - script.execute: update_climate_mode_label

  # HVAC Action
  - platform: homeassistant
    entity_id: climate.third_floor
    attribute: hvac_action
    id: hvac_action
    on_value:
      - script.execute: update_climate_mode_label

  # Media Title
  - platform: homeassistant
    entity_id: media_player.3rd_floor_speaker
    attribute: media_title
    id: media_title
    on_value:
      - lvgl.label.update:
          id: media_now_playing
          text: !lambda |-
            if (x.empty()) return "Nothing playing";
            return x.c_str();

  # Media Player State (for play/pause icon)
  - platform: homeassistant
    entity_id: media_player.3rd_floor_speaker
    id: media_player_state
    on_value:
      - lvgl.label.update:
          id: media_play_icon
          text: !lambda |-
            if (x == "playing") return "${pause}";
            return "${play}";

binary_sensor:

  # Office Light 1
  - platform: homeassistant
    id: light_1_state
    entity_id: light.chris_s_light
    trigger_on_initial_state: true
    on_state:
      then:
        lvgl.widget.update:
          id: light_1_btn
          state:
            checked: !lambda return x;

  # Office Light 2
  - platform: homeassistant
    id: light_2_state
    entity_id: light.chrislight2
    trigger_on_initial_state: true
    on_state:
      then:
        lvgl.widget.update:
          id: light_2_btn
          state:
            checked: !lambda return x;

  # Loft Light
  - platform: homeassistant
    id: light_3_state
    entity_id: light.loft_light
    trigger_on_initial_state: true
    on_state:
      then:
        lvgl.widget.update:
          id: light_3_btn
          state:
            checked: !lambda return x;

# Scripts
script:

  # Adjust temperature up (+1F both setpoints)
  - id: temp_adjust_up
    then:
      - globals.set:
          id: target_temp_low
          value: !lambda return id(target_temp_low) + 1.0;
      - globals.set:
          id: target_temp_high
          value: !lambda return id(target_temp_high) + 1.0;
      - homeassistant.service:
          service: climate.set_temperature
          data:
            entity_id: climate.third_floor
            hvac_mode: heat_cool
          data_template:
            target_temp_low: "{{ target_temp_low }}"
            target_temp_high: "{{ target_temp_high }}"
          variables:
            target_temp_low: !lambda return id(target_temp_low);
            target_temp_high: !lambda return id(target_temp_high);
      - lvgl.label.update:
          id: climate_target_range
          text:
            format: "%.0f - %.0fF"
            args: [ 'id(target_temp_low)', 'id(target_temp_high)' ]

  # Adjust temperature down (-1F both setpoints)
  - id: temp_adjust_down
    then:
      - globals.set:
          id: target_temp_low
          value: !lambda return id(target_temp_low) - 1.0;
      - globals.set:
          id: target_temp_high
          value: !lambda return id(target_temp_high) - 1.0;
      - homeassistant.service:
          service: climate.set_temperature
          data:
            entity_id: climate.third_floor
            hvac_mode: heat_cool
          data_template:
            target_temp_low: "{{ target_temp_low }}"
            target_temp_high: "{{ target_temp_high }}"
          variables:
            target_temp_low: !lambda return id(target_temp_low);
            target_temp_high: !lambda return id(target_temp_high);
      - lvgl.label.update:
          id: climate_target_range
          text:
            format: "%.0f - %.0fF"
            args: [ 'id(target_temp_low)', 'id(target_temp_high)' ]

  # Update combined climate mode label
  - id: update_climate_mode_label
    then:
      - lvgl.label.update:
          id: climate_mode_label
          text: !lambda |-
            std::string mode = id(hvac_mode).state;
            std::string action = id(hvac_action).state;
            // Capitalize first letter
            if (!mode.empty()) mode[0] = toupper(mode[0]);
            if (!action.empty()) action[0] = toupper(action[0]);
            // Replace underscores with spaces
            for (auto &c : mode) if (c == '_') c = ' ';
            for (auto &c : action) if (c == '_') c = ' ';
            static char buf[64];
            snprintf(buf, sizeof(buf), "%s - %s", mode.c_str(), action.c_str());
            return buf;
