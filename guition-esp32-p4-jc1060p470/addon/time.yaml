# Diagnostic globals
globals:
  - id: tick_count
    type: int
    restore_value: no
    initial_value: '0'
  - id: last_api_client
    type: std::string
    restore_value: no
    initial_value: '"(none)"'

# SNTP Time
time:
  - platform: sntp
    id: sntp_time
    timezone: America/New_York
    servers:
     - 0.pool.ntp.org
     - 1.pool.ntp.org
     - 2.pool.ntp.org
    on_time_sync:
      - script.execute: time_update
    on_time:
      - minutes: '*'
        seconds: 0
        then:
          - script.execute: time_update
      - seconds: /5
        then:
          - script.execute: tick_update
          - script.execute: update_diag_labels

# Dual Timezone Clock (ET + PT) + Diagnostic Scripts
script:
  - id: time_update
    then:
      - lvgl.label.update:
          id: display_time
          text: !lambda |-
            static char time_buf[32];
            auto now = id(sntp_time).now();
            int et_hour = now.hour;
            int et_min = now.minute;
            // Pacific = Eastern - 3 hours (both shift DST together)
            int pt_hour = et_hour - 3;
            if (pt_hour < 0) pt_hour += 24;
            // Convert ET to 12-hour
            const char *et_ampm = (et_hour >= 12) ? "PM" : "AM";
            int et_h12 = et_hour % 12;
            if (et_h12 == 0) et_h12 = 12;
            // Convert PT to 12-hour
            const char *pt_ampm = (pt_hour >= 12) ? "PM" : "AM";
            int pt_h12 = pt_hour % 12;
            if (pt_h12 == 0) pt_h12 = 12;
            snprintf(time_buf, sizeof(time_buf), "%d:%02d %s ET | %d:%02d %s PT",
                     et_h12, et_min, et_ampm, pt_h12, et_min, pt_ampm);
            return time_buf;

  - id: tick_update
    then:
      - lambda: 'id(tick_count) += 1;'
      - lvgl.label.update:
          id: test_counter
          text: !lambda |-
            static char buf[16];
            snprintf(buf, sizeof(buf), "Tick: %d", id(tick_count));
            return buf;

  - id: update_diag_labels
    then:
      # WiFi signal (local sensor, no HA needed)
      - lvgl.label.update:
          id: wifi_db_label
          text: !lambda |-
            static char buf[32];
            if (id(wifi_signal_db).has_state()) {
              snprintf(buf, sizeof(buf), "WiFi: %.0f dB", id(wifi_signal_db).state);
            } else {
              snprintf(buf, sizeof(buf), "WiFi: no reading");
            }
            return buf;
      # API connection status
      - lvgl.label.update:
          id: api_status_label
          text: !lambda |-
            static char buf[64];
            bool any_client = id(main_api).is_connected();
            bool ha_subscribed = id(media_player_state).has_state();
            snprintf(buf, sizeof(buf), "API: %s | HA subscribed: %s",
                     any_client ? "YES" : "NO",
                     ha_subscribed ? "YES" : "NO");
            return buf;
      # Last API client info
      - lvgl.label.update:
          id: last_client_label
          text: !lambda |-
            static char buf[96];
            snprintf(buf, sizeof(buf), "Last client: %s", id(last_api_client).c_str());
            return buf;
      # Speaker state (the actual HA entity test)
      - lvgl.label.update:
          id: speaker_state_label
          text: !lambda |-
            if (!id(media_player_state).has_state()) return "Speaker: no state";
            static char buf[64];
            snprintf(buf, sizeof(buf), "Speaker: %s", id(media_player_state).state.c_str());
            return buf;
