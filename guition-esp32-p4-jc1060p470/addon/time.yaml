# SNTP Time
time:
  - platform: sntp
    id: sntp_time
    timezone: America/New_York
    servers:
     - 0.pool.ntp.org
     - 1.pool.ntp.org
     - 2.pool.ntp.org
    on_time_sync:
      - script.execute: time_update
    on_time:
      - minutes: '*'
        seconds: 0
        then:
          - script.execute: time_update

# Production Scripts
script:
  # Dual Timezone Clock (ET + PT)
  - id: time_update
    then:
      - lvgl.label.update:
          id: display_time
          text: !lambda |-
            static char time_buf[32];
            auto now = id(sntp_time).now();
            int et_hour = now.hour;
            int et_min = now.minute;
            // Pacific = Eastern - 3 hours (both shift DST together)
            int pt_hour = et_hour - 3;
            if (pt_hour < 0) pt_hour += 24;
            // Convert ET to 12-hour
            const char *et_ampm = (et_hour >= 12) ? "PM" : "AM";
            int et_h12 = et_hour % 12;
            if (et_h12 == 0) et_h12 = 12;
            // Convert PT to 12-hour
            const char *pt_ampm = (pt_hour >= 12) ? "PM" : "AM";
            int pt_h12 = pt_hour % 12;
            if (pt_h12 == 0) pt_h12 = 12;
            snprintf(time_buf, sizeof(time_buf), "%d:%02d %s ET | %d:%02d %s PT",
                     et_h12, et_min, et_ampm, pt_h12, et_min, pt_ampm);
            return time_buf;

  # Update media labels when title/artist changes
  - id: update_media_labels
    mode: restart
    then:
      - lvgl.label.update:
          id: media_title
          text: !lambda |-
            if (id(media_title_attr).has_state() && id(media_title_attr).state.length() > 0)
              return id(media_title_attr).state.c_str();
            return "No media";
      - lvgl.label.update:
          id: media_artist
          text: !lambda |-
            if (id(media_artist_attr).has_state())
              return id(media_artist_attr).state.c_str();
            return "";

  # Update play/pause button state
  - id: update_play_state
    mode: restart
    then:
      - lvgl.label.update:
          id: media_now_playing
          text: !lambda |-
            if (!id(media_player_state).has_state()) return "Media Player";
            std::string state = id(media_player_state).state;
            if (state == "playing") return "Now Playing";
            if (state == "paused") return "Paused";
            return "Idle";
      - if:
          condition:
            lambda: 'return id(media_player_state).has_state() && id(media_player_state).state == "playing";'
          then:
            - lvgl.widget.update:
                id: btn_play_pause
                state:
                  checked: true
            - lvgl.label.update:
                id: play_pause_icon
                text: "\U000F03E4"
          else:
            - lvgl.widget.update:
                id: btn_play_pause
                state:
                  checked: false
            - lvgl.label.update:
                id: play_pause_icon
                text: "\U000F040A"

  # Update conditions card (temp + humidity)
  - id: update_conditions_card
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return id(third_floor_temperature).has_state();'
          then:
            - lvgl.label.update:
                id: room_temp_value
                text:
                  format: "%.0f"
                  args: ['id(third_floor_temperature).state']
      - if:
          condition:
            lambda: 'return id(third_floor_humidity).has_state();'
          then:
            - lvgl.label.update:
                id: room_humidity_value
                text:
                  format: "%.0f"
                  args: ['id(third_floor_humidity).state']

  # Update door status icons
  - id: update_door_status
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return id(front_door_state).has_state();'
          then:
            - if:
                condition:
                  lambda: 'return id(front_door_state).state;'
                then:
                  - lvgl.label.update:
                      id: front_door_icon
                      text: "\U000F081F"
                      text_color: 0xFF8C00
                else:
                  - lvgl.label.update:
                      id: front_door_icon
                      text: "\U000F081A"
                      text_color: 0x39FF14
      - if:
          condition:
            lambda: 'return id(garage_door_state).has_state();'
          then:
            - if:
                condition:
                  lambda: 'return id(garage_door_state).state;'
                then:
                  - lvgl.label.update:
                      id: garage_door_icon
                      text: "\U000F0804"
                      text_color: 0xFF8C00
                else:
                  - lvgl.label.update:
                      id: garage_door_icon
                      text: "\U000F06D9"
                      text_color: 0x39FF14
      # Amber glow on card when any door is open
      - if:
          condition:
            lambda: |-
              bool any_open = false;
              if (id(front_door_state).has_state() && id(front_door_state).state) any_open = true;
              if (id(garage_door_state).has_state() && id(garage_door_state).state) any_open = true;
              return any_open;
          then:
            - lvgl.widget.update:
                id: door_status_card
                shadow_width: 8
                shadow_color: 0xFF8C00
                shadow_opa: 80%
          else:
            - lvgl.widget.update:
                id: door_status_card
                shadow_width: 0

  # Update climate card
  - id: update_climate_card
    mode: restart
    then:
      # Mode icon + action label
      - lvgl.label.update:
          id: climate_mode_icon
          text: !lambda |-
            if (id(climate_action).has_state()) {
              std::string action = id(climate_action).state;
              if (action == "heating") return "\U000F0238";
              if (action == "cooling") return "\U000F0717";
            }
            return "\U000F0E4E";
      - if:
          condition:
            lambda: 'return id(climate_action).has_state() && id(climate_action).state == "heating";'
          then:
            - lvgl.widget.update:
                id: climate_mode_icon
                text_color: 0xFF8C00
                shadow_width: 8
                shadow_color: 0xFF8C00
                shadow_opa: 60%
          else:
            - if:
                condition:
                  lambda: 'return id(climate_action).has_state() && id(climate_action).state == "cooling";'
                then:
                  - lvgl.widget.update:
                      id: climate_mode_icon
                      text_color: 0x00E5FF
                      shadow_width: 8
                      shadow_color: 0x00E5FF
                      shadow_opa: 60%
                else:
                  - lvgl.widget.update:
                      id: climate_mode_icon
                      text_color: 0x7B7BA0
                      shadow_width: 0
      - lvgl.label.update:
          id: climate_action_label
          text: !lambda |-
            if (!id(climate_action).has_state()) return "Off";
            std::string action = id(climate_action).state;
            if (action == "heating") return "Heating";
            if (action == "cooling") return "Cooling";
            if (action == "idle") return "Idle";
            return "Off";
      # Target range label
      - lvgl.label.update:
          id: climate_target_label
          text: !lambda |-
            static char buf[20];
            if (id(climate_target_low).has_state() && id(climate_target_high).has_state()) {
              snprintf(buf, sizeof(buf), "%.0f \xe2\x80\x94 %.0f\xc2\xb0""F",
                       id(climate_target_low).state, id(climate_target_high).state);
              return buf;
            }
            return "--\xc2\xb0""F";
      # Preset label
      - lvgl.label.update:
          id: climate_preset_label
          text: !lambda |-
            if (id(climate_preset).has_state() && id(climate_preset).state.length() > 0)
              return id(climate_preset).state.c_str();
            return "";

  # Update weather condition image
  - id: update_weather_image
    mode: restart
    then:
      - lambda: |-
          // Hide all weather images first
          lv_obj_add_flag(id(w_sunny), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(w_clear_night), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(w_cloudy), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(w_partlycloudy_sun), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(w_partlycloudy_moon), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(w_rainy), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(w_pouring), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(w_snowy), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(w_snowy_rainy), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(w_fog), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(w_hail), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(w_lightning), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(w_lightning_rainy), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(w_windy), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(w_windy_variant), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(w_windsock), LV_OBJ_FLAG_HIDDEN);

          if (!id(weather_condition).has_state()) return;
          std::string cond = id(weather_condition).state;
          bool is_night = id(sun_state).has_state() && id(sun_state).state == "below_horizon";

          lv_obj_t *target = nullptr;
          if (cond == "sunny" || cond == "clear-night") {
            target = is_night ? id(w_clear_night) : id(w_sunny);
          } else if (cond == "partlycloudy") {
            target = is_night ? id(w_partlycloudy_moon) : id(w_partlycloudy_sun);
          } else if (cond == "cloudy") {
            target = id(w_cloudy);
          } else if (cond == "rainy") {
            target = id(w_rainy);
          } else if (cond == "pouring") {
            target = id(w_pouring);
          } else if (cond == "snowy") {
            target = id(w_snowy);
          } else if (cond == "snowy-rainy") {
            target = id(w_snowy_rainy);
          } else if (cond == "fog") {
            target = id(w_fog);
          } else if (cond == "hail") {
            target = id(w_hail);
          } else if (cond == "lightning") {
            target = id(w_lightning);
          } else if (cond == "lightning-rainy") {
            target = id(w_lightning_rainy);
          } else if (cond == "windy") {
            target = id(w_windy);
          } else if (cond == "windy-variant") {
            target = id(w_windy_variant);
          } else if (cond == "exceptional") {
            target = id(w_windsock);
          } else {
            target = id(w_cloudy);
          }

          if (target != nullptr) {
            lv_obj_clear_flag(target, LV_OBJ_FLAG_HIDDEN);
          }

          // Update condition text label
          std::string label = "";
          if (cond == "sunny") label = "Sunny";
          else if (cond == "clear-night") label = "Clear";
          else if (cond == "partlycloudy") label = "Partly Cloudy";
          else if (cond == "cloudy") label = "Cloudy";
          else if (cond == "rainy") label = "Rain";
          else if (cond == "pouring") label = "Heavy Rain";
          else if (cond == "snowy") label = "Snow";
          else if (cond == "snowy-rainy") label = "Sleet";
          else if (cond == "fog") label = "Fog";
          else if (cond == "hail") label = "Hail";
          else if (cond == "lightning") label = "Thunder";
          else if (cond == "lightning-rainy") label = "Thunderstorm";
          else if (cond == "windy") label = "Windy";
          else if (cond == "windy-variant") label = "Windy";
          else if (cond == "exceptional") label = "Severe";
          lv_label_set_text(id(weather_condition_label), label.c_str());

  # Update volume buttons (10-level neon segments)
  - id: update_volume_buttons
    mode: restart
    then:
      - lvgl.widget.update:
          id: vol_btn_1
          bg_color: !lambda 'return (id(media_volume_level).state >= 0.05) ? lv_color_hex(0x00E5FF) : lv_color_hex(0x1A1A3A);'
          shadow_width: !lambda 'return (id(media_volume_level).state >= 0.05) ? 8 : 0;'
          shadow_color: 0x00E5FF
          shadow_opa: 60%
      - lvgl.widget.update:
          id: vol_btn_2
          bg_color: !lambda 'return (id(media_volume_level).state >= 0.15) ? lv_color_hex(0x00E5FF) : lv_color_hex(0x1A1A3A);'
          shadow_width: !lambda 'return (id(media_volume_level).state >= 0.15) ? 8 : 0;'
          shadow_color: 0x00E5FF
          shadow_opa: 60%
      - lvgl.widget.update:
          id: vol_btn_3
          bg_color: !lambda 'return (id(media_volume_level).state >= 0.25) ? lv_color_hex(0x00E5FF) : lv_color_hex(0x1A1A3A);'
          shadow_width: !lambda 'return (id(media_volume_level).state >= 0.25) ? 8 : 0;'
          shadow_color: 0x00E5FF
          shadow_opa: 60%
      - lvgl.widget.update:
          id: vol_btn_4
          bg_color: !lambda 'return (id(media_volume_level).state >= 0.35) ? lv_color_hex(0x00E5FF) : lv_color_hex(0x1A1A3A);'
          shadow_width: !lambda 'return (id(media_volume_level).state >= 0.35) ? 8 : 0;'
          shadow_color: 0x00E5FF
          shadow_opa: 60%
      - lvgl.widget.update:
          id: vol_btn_5
          bg_color: !lambda 'return (id(media_volume_level).state >= 0.45) ? lv_color_hex(0x00E5FF) : lv_color_hex(0x1A1A3A);'
          shadow_width: !lambda 'return (id(media_volume_level).state >= 0.45) ? 8 : 0;'
          shadow_color: 0x00E5FF
          shadow_opa: 60%
      - lvgl.widget.update:
          id: vol_btn_6
          bg_color: !lambda 'return (id(media_volume_level).state >= 0.55) ? lv_color_hex(0x00E5FF) : lv_color_hex(0x1A1A3A);'
          shadow_width: !lambda 'return (id(media_volume_level).state >= 0.55) ? 8 : 0;'
          shadow_color: 0x00E5FF
          shadow_opa: 60%
      - lvgl.widget.update:
          id: vol_btn_7
          bg_color: !lambda 'return (id(media_volume_level).state >= 0.65) ? lv_color_hex(0x00E5FF) : lv_color_hex(0x1A1A3A);'
          shadow_width: !lambda 'return (id(media_volume_level).state >= 0.65) ? 8 : 0;'
          shadow_color: 0x00E5FF
          shadow_opa: 60%
      - lvgl.widget.update:
          id: vol_btn_8
          bg_color: !lambda 'return (id(media_volume_level).state >= 0.75) ? lv_color_hex(0x00E5FF) : lv_color_hex(0x1A1A3A);'
          shadow_width: !lambda 'return (id(media_volume_level).state >= 0.75) ? 8 : 0;'
          shadow_color: 0x00E5FF
          shadow_opa: 60%
      - lvgl.widget.update:
          id: vol_btn_9
          bg_color: !lambda 'return (id(media_volume_level).state >= 0.85) ? lv_color_hex(0x00E5FF) : lv_color_hex(0x1A1A3A);'
          shadow_width: !lambda 'return (id(media_volume_level).state >= 0.85) ? 8 : 0;'
          shadow_color: 0x00E5FF
          shadow_opa: 60%
      - lvgl.widget.update:
          id: vol_btn_10
          bg_color: !lambda 'return (id(media_volume_level).state >= 0.95) ? lv_color_hex(0x00E5FF) : lv_color_hex(0x1A1A3A);'
          shadow_width: !lambda 'return (id(media_volume_level).state >= 0.95) ? 8 : 0;'
          shadow_color: 0x00E5FF
          shadow_opa: 60%
      - lvgl.arc.update:
          id: volume_arc
          value: !lambda 'return (int)(id(media_volume_level).state * 100);'
